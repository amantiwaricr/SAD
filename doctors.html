<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctors - Modern HMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-hospital-symbol"></i> HMS
        </div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
            <li><a href="patients.html"><i class="fas fa-user-injured"></i> Patients</a></li>
            <li><a href="doctors.html" class="active"><i class="fas fa-user-md"></i> Doctors</a></li>
            <li><a href="schedule.html"><i class="fas fa-calendar-alt"></i> Schedule</a></li>
            <li><a href="appointments.html"><i class="fas fa-calendar-check"></i> Appointments</a></li>
            <li><a href="billing.html"><i class="fas fa-file-invoice-dollar"></i> Billing</a></li>
            <li><a href="pharmacy.html"><i class="fas fa-pills"></i> Pharmacy</a></li>
            <li><a href="lab.html"><i class="fas fa-flask"></i> Lab</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="header">
            <div class="page-title">Doctor Records</div>
            <div class="user-info">
                <span id="userNameDisplay">Loading...</span>
                <span class="badge bg-success" id="userRoleDisplay">Role</span>
                <button id="logoutBtn" class="btn btn-danger btn-sm"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </header>

        <section class="content-area">
            <div class="card">
                <div class="card-header">
                    <h2>Doctor List</h2>
                    <button class="btn btn-primary" onclick="showModal('doctorModal')"><i class="fas fa-plus"></i> Add Doctor</button>
                </div>
                <div class="table-responsive">
                    <table id="doctorsTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Specialization</th>
                                <th>Contact</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="5">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal -->
    <div class="modal" id="doctorModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add/Edit Doctor</h2>
                <button class="close-btn" onclick="hideModal('doctorModal')">&times;</button>
            </div>
            <form id="doctorForm">
                <input type="hidden" name="id">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="first_name" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" name="last_name" required>
                </div>
                <div class="form-group">
                    <label>Specialization</label>
                    <input type="text" name="specialization" required>
                </div>
                <div class="form-group">
                    <label>Contact Number</label>
                    <input type="text" name="contact">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">Save Doctor</button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        async function loadDoctors() {
            try {
                const data = await api.get('doctors');
                const tbody = document.querySelector('#doctorsTable tbody');
                tbody.innerHTML = '';
                if(data && data.length > 0 && Array.isArray(data)) {
                    data.forEach(d => {
                        const tr = document.createElement('tr');
                        const pJson = JSON.stringify(d).replace(/'/g, "&apos;").replace(/"/g, "&quot;");
                        tr.innerHTML = `
                            <td>#${d.id}</td>
                            <td>Dr. ${d.first_name} ${d.last_name}</td>
                            <td><span class="badge bg-success">${d.specialization}</span></td>
                            <td>${d.contact || 'N/A'}</td>
                            <td>
                                <button class="btn btn-sm btn-primary" onclick="editDoctor('${pJson}')"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-sm btn-danger" onclick="deleteItem('doctors', ${d.id}, loadDoctors)"><i class="fas fa-trash"></i></button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="5">No doctors found</td></tr>';
                }
            } catch (err) {
                console.error(err);
                document.querySelector('#doctorsTable tbody').innerHTML = '<tr><td colspan="5">Error loading data.</td></tr>';
            }
        }

        function editDoctor(dataStr) {
            const data = JSON.parse(dataStr);
            populateForm('doctorForm', data);
            showModal('doctorModal');
        }

        document.getElementById('doctorForm').addEventListener('submit', (e) => {
            handleFormSubmit(e, 'doctors', loadDoctors);
        });

        document.addEventListener('DOMContentLoaded', loadDoctors);
    </script>
</body>
</html>
