<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Modern HMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div style="font-size: 3rem; color: var(--primary-color); margin-bottom: 1rem;">
                <i class="fas fa-hospital-user"></i>
            </div>
            <h1>Welcome Back</h1>
            <p>Sign in to access the Hospital Management System</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <div class="form-group">
                    <label for="login_role">Login As</label>
                    <select id="login_role" style="width: 100%; padding: 0.75rem 1rem; border: 1px solid #e5e7eb; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 0.95rem; outline: none; background: white;">
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <!-- Adding a note for the demo -->
                <p style="font-size: 0.8rem; color: #888; text-align: left; margin-bottom: 5px;">Demo Admin: admin /
                    admin123</p>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
                <div style="text-align: center; margin-top: 15px;">
                    <a href="signup.html" style="font-size: 0.9rem; color: var(--primary-color); text-decoration: none;">Don't have an account? Sign up</a>
                </div>
            </form>

            <div id="authError"
                style="color: var(--danger-color); margin-top: 1rem; font-size: 0.875rem; display: none;"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Check if already logged in
        api.checkAuth().then(res => {
            if (res.status === 'success') {
                if (res.user && res.user.role === 'admin') {
                    window.location.href = 'admin_dashboard.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            }
        });

        const loginForm = document.getElementById('loginForm');
        const errorDiv = document.getElementById('authError');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const selectedRole = document.getElementById('login_role').value;

            try {
                const res = await api.login(username, password);
                if (res.status === 'success') {
                    if (selectedRole === 'admin' && res.role !== 'admin') {
                        errorDiv.textContent = 'Access denied. Administrator privileges required.';
                        errorDiv.style.display = 'block';
                        return;
                    }
                    
                    if (selectedRole === 'admin') {
                        window.location.href = 'admin_dashboard.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    errorDiv.textContent = res.message;
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Connection error. Please try again later.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>

</html>
